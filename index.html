<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <title>Unsaid Goodbye</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #unity-canvas {
        width: 100%;
        height: 100%;
        position: fixed;
        /* 手机端关键：阻止浏览器拦截触摸做滚动/缩放/回弹 */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1" style="background: #000"></canvas>

    <script src="Build/UnsaidGoodbye_Web.loader.js"></script>
    <script>
      // 横屏锁定（全平台）
      function lockLandscape() {
        try {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function(e) {});
          }
        } catch(e) {}
      }
      document.addEventListener('touchstart', lockLandscape, { once: true });
      document.addEventListener('click', lockLandscape, { once: true });
      lockLandscape();
      window.addEventListener('orientationchange', function() {
        setTimeout(lockLandscape, 100);
      });

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/UnsaidGoodbye_Web.data.unityweb",
        frameworkUrl: "Build/UnsaidGoodbye_Web.framework.js.unityweb",
        codeUrl: "Build/UnsaidGoodbye_Web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Unsaid Goodbye",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
