<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unsaid Goodbye</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      #unity-canvas {
        /* 手机端关键：阻止浏览器拦截触摸做滚动/缩放/回弹 */
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1" style="width: 1920px; height: 1080px; background: #000"></canvas>

    <script src="Build/UnsaidGoodbye_Web.loader.js"></script>
    <script>
      // 确保 canvas 能接收输入事件
      var canvas = document.querySelector("#unity-canvas");
      canvas.addEventListener('touchstart', function(e) { e.stopPropagation(); }, { passive: false });
      canvas.addEventListener('click', function() { canvas.focus(); });

      // 手机端适配：全屏 canvas + viewport + 禁止缩放 + 横屏锁定
      if (/iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        // 横屏锁定
        function lockLandscape() {
          try {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(function(e) {});
            }
          } catch(e) {}
        }
        document.addEventListener('touchstart', lockLandscape, { once: true });
        lockLandscape();
        window.addEventListener('orientationchange', function() {
          setTimeout(lockLandscape, 100);
        });
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/UnsaidGoodbye_Web.data.unityweb",
        frameworkUrl: "Build/UnsaidGoodbye_Web.framework.js.unityweb",
        codeUrl: "Build/UnsaidGoodbye_Web.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Unsaid Goodbye",
        productVersion: "1.0",
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
