<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <title>Unsaid Goodbye</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    /* 防止浏览器拦截触摸事件（滚动、缩放、回弹） */
    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="unity-canvas" width="#UNITY_WIDTH#" height="#UNITY_HEIGHT#" tabindex="-1"></canvas>

  <script>
    // 横屏锁定：使用 Screen Orientation API
    function lockLandscape() {
      try {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function() {
            // 某些浏览器不支持 orientation.lock，静默失败
          });
        }
      } catch(e) {}
    }

    // 用户首次交互时锁定横屏（浏览器要求用户手势）
    document.addEventListener('touchstart', lockLandscape, { once: true });
    document.addEventListener('click', lockLandscape, { once: true });
    // 也尝试立即锁定（部分桌面浏览器支持无手势锁定）
    lockLandscape();

    // 监听横竖屏变化提示
    window.addEventListener('orientationchange', function() {
      setTimeout(lockLandscape, 100);
    });
  </script>

</body>
</html>
